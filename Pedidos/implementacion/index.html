<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: requerido para safe-area-inset (notch/Dynamic Island/home indicator) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO -->
  <title>MiRest con IA · Pedidos</title>
  <meta name="description"
    content="Módulo de Pedidos de MiRest con IA — gestión operativa de salón, delivery y para llevar para restaurantes y cevicherías." />
  <meta name="theme-color" content="#DE5A25" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F1220"  media="(prefers-color-scheme: dark)"  />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.svg" />
  <!-- iOS: permite modo standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pedidos" />
  <!-- Android: color de la barra de estado -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&display=swap" rel="stylesheet" />
  <script>document.documentElement.classList.add('js');</script>

  <!-- Design System — raíz (shell global) → módulo Pedidos → legacy → patch -->
  <script>
    window.__MIREST_ASSET_VERSION__ = 'pedidos-hub-operacion-20260527';
    window.__MIREST_DEV_BUST__ = ['localhost', '127.0.0.1'].includes(window.location.hostname)
      ? `?v=${window.__MIREST_ASSET_VERSION__}`
      : '';
    document.write(`<link rel="stylesheet" href="../../styles/tokens.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="../../styles/base.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="../../styles/layout.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="../../styles/components.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="../../styles/premium-modules.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="../../styles/mobile.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="./frontend/styles/tokens.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="./frontend/styles/base.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="./frontend/styles/components.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="./frontend/styles/modules.css${window.__MIREST_DEV_BUST__}" />`);
    document.write(`<link rel="stylesheet" href="./styles.css${window.__MIREST_DEV_BUST__}" />`);
  </script>
  <!-- Patch: corrige issues críticos del legacy styles.css (cargado al final) -->
  <script>document.write(`<link rel="stylesheet" href="./frontend/styles/patch.css${window.__MIREST_DEV_BUST__}" />`);</script>
  <!-- Vuelta al dashboard global (index.html) — visible en toda resolución -->
  <script>document.write(`<link rel="stylesheet" href="./frontend/styles/mirest-global-bridge.css${window.__MIREST_DEV_BUST__}" />`);</script>

  <script>
    if (['localhost', '127.0.0.1'].includes(window.location.hostname) && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
          .then(() => caches?.keys?.().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) || Promise.resolve())
          .then(() => {
            console.info('[dev] Service Workers y caché limpiados para Live Server.');
          })
          .catch((error) => {
            console.warn('[dev] No se pudo limpiar el entorno local:', error);
          });
      }, { once: true });
    }
  </script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body
  class="pedidos-module page-ready"
  data-theme="light"
  data-mode="salon"
  data-module="pedidos"
  data-page-type="module"
  data-module-key="pedidos"
  data-root-path="../../"
>
  <div class="app-shell" id="appShell">

    <!-- Mismo panel lateral que el dashboard principal (index.html) -->
    <aside class="sidebar" id="appSidebar" aria-label="Navegación de la plataforma">
      <div class="sidebar__brand">
        <div class="brand-mark" aria-hidden="true">IA</div>
        <div class="brand-copy">
          <span class="brand-copy__eyebrow">MiRest</span>
          <strong>MiRest con IA</strong>
          <span>Dashboard administrativo base</span>
        </div>
      </div>
      <div id="pedidosDashboardNavHost" class="pedidos-dashboard-nav-host" hidden></div>
      <nav id="sidebarNav" class="sidebar__nav" aria-label="Menú principal y módulos"></nav>
    </aside>

    <button
      type="button"
      class="sidebar-backdrop"
      id="sidebarBackdrop"
      aria-label="Cerrar navegación lateral"
      tabindex="-1"
    ></button>

    <!-- ── MAIN ────────────────────────────────────────────────── -->
    <div class="app-main">
      <nav class="mirest-global-bridge" aria-label="Aplicación principal — volver al panel">
        <a
          class="mirest-global-bridge__home"
          id="mirestGlobalHomeLink"
          href="../../index.html"
        >← Panel principal (Dashboard global)</a>
        <span class="mirest-global-bridge__crumb" aria-hidden="true">·</span>
        <span class="mirest-global-bridge__where">Módulo Pedidos</span>
      </nav>

      <!-- TOPBAR -->
      <header class="topbar topbar--pedidos" id="topbar">
        <div class="topbar__left">
          <button
            type="button"
            class="icon-button topbar__menu-toggle topbar--pedidos__open-nav"
            id="sidebarToggle"
            aria-label="Abrir o cerrar la navegación de la plataforma"
            aria-controls="appSidebar"
            aria-expanded="false"
          >
            <i data-lucide="menu" aria-hidden="true"></i>
          </button>
          <div>
            <p class="eyebrow" id="topbarEyebrow">Módulo</p>
            <h1 id="topbarTitle">Pedidos</h1>
          </div>
        </div>

        <!-- Mode switcher (desktop/tablet) -->
        <div class="topbar__center" id="modeSwitcher" aria-label="Selector de área operativa"></div>
      </header>

      <!-- CONTENIDO PRINCIPAL -->
      <main class="page-content" id="pageContent">
        <!-- Módulos PWA (Pedidos, Caja, Menú…) — inyecta modular-app.js -->
        <div id="pwaModuleStrip" class="pwa-module-strip" hidden aria-label="Cambiar módulo operativo"></div>

        <div id="pedidosHubNav" class="pedidos-hub-wrap" hidden aria-label="Vistas del módulo Pedidos"></div>

        <!-- Hero del modo operativo -->
        <section id="modeHero" aria-label="Estado del área activa"></section>

        <!-- Summary cards del turno -->
        <section
          class="summary-grid"
          id="summaryStats"
          aria-label="Resumen del turno actual"
          aria-live="polite"
        ></section>

        <!-- Workspace: área principal + panel contextual -->
        <section
          class="workspace-layout"
          id="workspaceLayout"
          data-mode="salon"
          aria-label="Área de trabajo"
        >
          <!-- Panel principal -->
          <div class="workspace-main">
            <section class="workspace-card" id="workspaceCard">
              <header class="workspace-card__header" id="workspaceHeader"></header>
              <div id="workspaceToolbar" role="toolbar" aria-label="Filtros y acciones"></div>
              <div
                class="workspace-region"
                id="workspaceContent"
                aria-live="polite"
                aria-label="Contenido del área de trabajo"
              ></div>
            </section>
          </div>

          <!-- Panel contextual derecho (desktop) -->
          <aside
            class="management-panel"
            id="managementPanel"
            aria-label="Panel de pedido activo"
          ></aside>
        </section>

      </main>
    </div><!-- /app-main -->
  </div><!-- /app-shell -->

  <!-- ── ROOTS DE OVERLAYS ──────────────────────────────────────── -->

  <!-- Modales centrados -->
  <div id="modalRoot" aria-live="assertive"></div>

  <!-- Drawers laterales / bottom sheets -->
  <div id="drawerRoot"></div>

  <!-- Onboarding (PRE / PRO) -->
  <div id="onboardingRoot"></div>

  <!-- Toasts / notificaciones inline -->
  <div
    id="toastRoot"
    class="toast-stack"
    aria-live="assertive"
    aria-atomic="true"
    role="status"
  ></div>

  <!-- ── Bootstrap — entrada del sistema modular ───────────────── -->
  <!--
    type="module" garantiza:
    - ES modules nativos (import/export)
    - Diferido por defecto (no bloquea el render)
    - Top-level await disponible en bootstrap.js
  -->
  <script type="module">
    import(`./frontend/core/bootstrap.js${window.__MIREST_DEV_BUST__}`);
  </script>
</body>

</html>
