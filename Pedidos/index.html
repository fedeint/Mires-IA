<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MiRest con IA · Pedidos</title>
    <meta name="description" content="Módulo Pedidos de MiRest con IA para salón, delivery y para llevar." />
    <meta name="theme-color" content="#de5a25" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q0F5JGJY4B"></script>
    <script src="../scripts/gtag-config.js"></script>
    <script>
      document.documentElement.classList.add("js");
      document.documentElement.dataset.theme = localStorage.getItem("mirest-ui-theme") || "light";
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&family=Inter:wght@300..900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="../Pwa/manifest.webmanifest" />
    
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/premium-modules.css" />
    <link rel="stylesheet" href="../styles/mobile.css?v=20260420-mobilev1" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-theme="light" data-mode="salon" data-module="pedidos">
    <div class="app-shell" id="appShell">
        <aside class="sidebar" id="sidebar" aria-label="Navegación principal">
            <div class="brand">
                <div class="brand__logo">IA</div>
                <div>
                    <strong>MiRest con IA</strong>
                    <span>Dashboard administrativo</span>
                </div>
            </div>
            
            <div class="sidebar__group">
                <p class="sidebar__label">Menu principal</p>
                <nav class="sidebar__nav">
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="inicio">
                        <div class="nav-icon">IN</div>
                        <span>Inicio</span>
                    </button>
                </nav>
            </div>

            <div class="sidebar__group">
                <p class="sidebar__label">Módulos</p>
                <nav class="sidebar__nav">
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="almacen" onclick="window.location.href='../Almacen/almacen.html'">
                        <div class="nav-icon">AL</div>
                        <span>Almacén</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="caja" onclick="window.location.href='../Caja/caja.html'">
                        <div class="nav-icon">CJ</div>
                        <span>Caja</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="clientes" onclick="window.location.href='../Clientes/clientes.html'">
                        <div class="nav-icon">CL</div>
                        <span>Clientes</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="cocina" onclick="window.location.href='../Cocina/cocina.html'">
                        <div class="nav-icon">CK</div>
                        <span>Cocina</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="delivery-afiliados" onclick="window.location.href='../DeliveryAfiliados/delivery.html'">
                        <div class="nav-icon">DA</div>
                        <span>Delivery Afiliados</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="facturacion" onclick="window.location.href='../Facturacion/facturacion.html'">
                        <div class="nav-icon">FC</div>
                        <span>Facturación</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="menu-actual">
                        <div class="nav-icon">MN</div>
                        <span>Menú Actual</span>
                    </button>
                    <button class="sidebar__item is-active" type="button" data-nav-module="pedidos" aria-current="page">
                        <div class="nav-icon">PD</div>
                        <span>Pedidos</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="recetas" onclick="window.location.href='../Recetas/recetas.html'">
                        <div class="nav-icon">RC</div>
                        <span>Recetas</span>
                    </button>
                    <button class="sidebar__item" type="button" data-action="dummy-click" data-module="reportes" onclick="window.location.href='../Reportes/reportes.html'">
                        <div class="nav-icon">RP</div>
                        <span>Reportes</span>
                    </button>
                </nav>
            </div>

            <div class="sidebar__group sidebar__group--footer">
                <div class="profile-card">
                    <div class="profile-card__avatar">DA</div>
                    <div>
                        <strong>Dalia</strong>
                        <span>Administradora</span>
                    </div>
                </div>
            </div>
        </aside>

        <button type="button" class="sidebar-backdrop" id="sidebarBackdrop" aria-label="Cerrar navegación"></button>

        <div class="app-main">
            <header class="topbar">
                <div class="topbar__left">
                    <button type="button" class="icon-button icon-button--ghost mobile-only" id="mobileSidebarToggle"
                        aria-label="Abrir navegación" aria-expanded="false">
                        <span class="icon-slot" data-icon="menu"></span>
                    </button>
                    <div>
                        <p class="eyebrow" id="topbarEyebrow">Pedidos</p>
                        <h1 id="topbarTitle">Pedidos</h1>
                    </div>
                </div>

                <div class="topbar__center" id="modeSwitcher"></div>

                <div class="topbar__right">
                    <label class="theme-toggle" for="themeToggle" aria-label="Alternar modo oscuro">
                        <span class="icon-slot" data-icon="sun"></span>
                        <input id="themeToggle" type="checkbox" />
                        <span class="theme-toggle__track"><span class="theme-toggle__thumb"></span></span>
                        <span class="icon-slot" data-icon="moon"></span>
                    </label>

                    <button type="button" class="user-chip" aria-label="Usuario actual">
                        <span class="user-chip__avatar">DA</span>
                        <span>Dalia</span>
                    </button>
                </div>
            </header>

            <main class="page-content">
                <section id="modeHero"></section>
                <section class="summary-grid" id="summaryStats" aria-label="Resumen del módulo Pedidos"></section>

                <section class="workspace-layout" id="workspaceLayout" data-mode="salon">
                    <div class="workspace-main">
                        <section class="card-surface workspace-card">
                            <header class="workspace-card__header" id="workspaceHeader"></header>
                            <div id="workspaceToolbar"></div>
                            <div class="workspace-region" id="workspaceContent" aria-live="polite"></div>
                        </section>
                    </div>

                    <aside class="management-panel card-surface" id="managementPanel" aria-label="Panel contextual"></aside>
                </section>
            </main>
        </div>
    </div>

    <div id="modalRoot"></div>
    <div id="drawerRoot"></div>
    <div id="onboardingRoot"></div>
    <div id="toastRoot" class="toast-stack" aria-live="assertive" aria-atomic="true"></div>

    <button id="themeFab" class="theme-fab" type="button" aria-label="Cambiar tema">
        <i data-lucide="moon"></i>
    </button>

    <script type="module" src="app.js"></script>
    <script>
        document.getElementById('themeFab')?.addEventListener('click', function() {
            const currentTheme = document.body.dataset.theme;
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.dataset.theme = newTheme;
            localStorage.setItem('mirest-ui-theme', newTheme);
            document.getElementById('themeToggle').checked = newTheme === 'dark';
        });
    </script>
</body>
</html>
