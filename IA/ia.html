<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f07c2a" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q0F5JGJY4B"></script>
    <script src="../scripts/gtag-config.js"></script>
    <title>MiRest con IA | DallA</title>
    <script>
      document.documentElement.classList.add("js");
      document.documentElement.dataset.theme = localStorage.getItem("mirest-ui-theme") || "light";
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&family=Inter:wght@300..900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="../Pwa/manifest.webmanifest" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/premium-modules.css" />
    <link rel="stylesheet" href="../styles/mobile.css?v=20260420-mobilev1" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --ia-accent:     var(--color-accent, #f07c2a);
        --ia-accent2:    var(--color-accent-dark, #d96a1a);
        --ia-accent-dim: rgba(240,124,42,.10);
        --ia-radius:     16px;
        --ia-font-d:     var(--font-display, 'Space Grotesk', sans-serif);
        --ia-font-b:     var(--font-body, 'Inter', sans-serif);
      }

      /* ── Wrapper principal ── */
      .ia-chat-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 148px);
        min-height: 440px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--ia-radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }

      /* ── Header con mascota ── */
      .ia-chat-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--color-border);
        background: linear-gradient(135deg,
          rgba(240,124,42,.10) 0%,
          rgba(240,124,42,.03) 50%,
          transparent 100%);
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }

      /* Glow decorativo */
      .ia-chat-header::before {
        content: '';
        position: absolute;
        top: -30px; left: -30px;
        width: 120px; height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(240,124,42,.18) 0%, transparent 70%);
        pointer-events: none;
      }

      .ia-mascot-wrap {
        position: relative;
        flex-shrink: 0;
        z-index: 1;
      }

      .ia-mascot-img {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        object-fit: cover;
        border: 2.5px solid var(--ia-accent);
        box-shadow: 0 0 0 4px var(--ia-accent-dim), 0 4px 16px rgba(240,124,42,.2);
        transition: transform .2s;
      }

      .ia-mascot-img:hover { transform: scale(1.05); }

      .ia-mascot-status {
        position: absolute;
        bottom: 3px; right: 3px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #22c55e;
        border: 2.5px solid var(--color-surface);
        box-shadow: 0 0 6px rgba(34,197,94,.5);
      }

      .ia-chat-header-info {
        flex: 1;
        min-width: 0;
        z-index: 1;
      }

      .ia-chat-header-name {
        font-family: var(--ia-font-d);
        font-size: 18px;
        font-weight: 800;
        color: var(--color-text);
        line-height: 1.2;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ia-badge-rag {
        font-size: 9px;
        font-weight: 800;
        padding: 2px 7px;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        color: #fff;
        letter-spacing: .06em;
        text-transform: uppercase;
      }

      .ia-chat-header-sub {
        font-size: 12px;
        color: var(--color-text-muted);
        margin-top: 3px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .ia-header-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
      }

      .ia-header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 1;
      }

      .ia-btn-icon {
        width: 34px; height: 34px;
        border-radius: 9px;
        border: 1px solid var(--color-border);
        background: var(--color-bg);
        color: var(--color-text-muted);
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background .12s, border-color .12s, color .12s;
      }

      .ia-btn-icon:hover {
        background: var(--ia-accent-dim);
        border-color: var(--ia-accent);
        color: var(--ia-accent);
      }

      /* ── Área de mensajes ── */
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px 12px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        scroll-behavior: smooth;
      }

      #chat-messages::-webkit-scrollbar { width: 4px; }
      #chat-messages::-webkit-scrollbar-track { background: transparent; }
      #chat-messages::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 4px;
      }

      /* ── Mensajes ── */
      .message {
        display: flex;
        gap: 10px;
        max-width: 80%;
        animation: ia-msg-in .22s ease;
      }

      @keyframes ia-msg-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .message--user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .message--assistant {
        align-self: flex-start;
      }

      /* Avatar en mensajes */
      .message__avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 2px;
        overflow: hidden;
      }

      .message--assistant .message__avatar {
        border: 1.5px solid var(--ia-accent);
        box-shadow: 0 0 0 3px var(--ia-accent-dim);
      }

      .message--user .message__avatar {
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 800;
        color: #fff;
        font-family: var(--ia-font-d);
      }

      .message__avatar img {
        width: 100%; height: 100%;
        object-fit: cover;
      }

      .message__body {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .message__sender {
        font-size: 11px;
        font-weight: 700;
        color: var(--color-text-muted);
        padding: 0 4px;
      }

      .message--user .message__sender { text-align: right; }

      .message__bubble {
        padding: 11px 15px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.65;
        word-break: break-word;
      }

      .message--user .message__bubble {
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 3px 14px rgba(240,124,42,.22);
      }

      .message--assistant .message__bubble {
        background: var(--color-bg);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: 4px;
      }

      .message__bubble ul { margin: 6px 0 0; padding-left: 18px; }
      .message__bubble li { margin-bottom: 4px; }
      .message__bubble strong { color: inherit; }

      /* ── Typing indicator ── */
      #typing-indicator {
        display: none;
        align-self: flex-start;
        align-items: center;
        gap: 10px;
        padding: 0 18px 14px;
      }

      #typing-indicator .ti-avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        overflow: hidden;
        border: 1.5px solid var(--ia-accent);
        box-shadow: 0 0 0 3px var(--ia-accent-dim);
        flex-shrink: 0;
      }

      #typing-indicator .ti-avatar img {
        width: 100%; height: 100%;
        object-fit: cover;
      }

      #typing-indicator .ti-dots {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 11px 15px;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }

      .typing-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--ia-accent);
        animation: ia-dot-bounce 1.2s infinite ease-in-out;
      }

      .typing-dot:nth-child(1) { animation-delay: 0s; }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes ia-dot-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
        30%            { transform: translateY(-6px); opacity: 1; }
      }

      /* ── Input area ── */
      .ia-input-area {
        border-top: 1px solid var(--color-border);
        padding: 12px 16px 14px;
        background: var(--color-surface);
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
      }

      .ia-input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      #chat-input {
        flex: 1;
        resize: none;
        border: 1.5px solid var(--color-border);
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 14px;
        font-family: var(--ia-font-b);
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
        min-height: 46px;
        max-height: 120px;
        overflow-y: auto;
        transition: border-color .15s, box-shadow .15s;
      }

      #chat-input:focus {
        outline: none;
        border-color: var(--ia-accent);
        box-shadow: 0 0 0 3px rgba(240,124,42,.12);
      }

      #chat-input:disabled { opacity: .5; cursor: not-allowed; }
      #chat-input::placeholder { color: var(--color-text-muted); }

      #btn-send {
        width: 46px; height: 46px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, var(--ia-accent), var(--ia-accent2));
        color: #fff;
        cursor: pointer;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        box-shadow: 0 3px 14px rgba(240,124,42,.35);
        transition: transform .12s, box-shadow .12s, filter .12s;
      }

      #btn-send:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(240,124,42,.5);
        filter: brightness(1.08);
      }

      #btn-send:active:not(:disabled) { transform: translateY(0); }

      #btn-send:disabled {
        opacity: .4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .ia-input-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .ia-input-hint {
        font-size: 11px;
        color: var(--color-text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .ia-input-hint kbd {
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 4px;
        border: 1px solid var(--color-border);
        background: var(--color-surface-muted);
        color: var(--color-text-muted);
        font-family: monospace;
      }

      #char-counter {
        font-size: 11px;
        color: var(--color-text-muted);
        font-variant-numeric: tabular-nums;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .ia-chat-wrapper { height: calc(100vh - 110px); border-radius: 12px; }
        #chat-messages { padding: 14px 12px 10px; gap: 14px; }
        .message { max-width: 92%; }
        .ia-input-area { padding: 10px 12px 12px; }
        .ia-chat-header { padding: 12px 14px; }
        .ia-mascot-img { width: 44px; height: 44px; }
        .ia-input-hint { display: none; }
      }

      @media (max-width: 480px) {
        .message { max-width: 96%; }
        .ia-input-footer { flex-wrap: wrap; }
      }
    </style>
  </head>

  <body data-root-path="../" data-page-type="module" data-module-key="ia">
    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar" id="appSidebar" aria-label="Panel lateral">
        <div class="sidebar__brand">
          <div class="brand-mark" aria-hidden="true">IA</div>
          <div class="brand-copy">
            <span class="brand-copy__eyebrow">MiRest</span>
            <strong>MiRest con IA</strong>
            <span>Dashboard administrativo</span>
          </div>
        </div>
        <nav id="sidebarNav" class="sidebar__nav" aria-label="Navegación principal"></nav>
      </aside>

      <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="Cerrar navegación lateral"></button>

      <!-- App main -->
      <div class="app-main">
        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar__lead">
            <button class="icon-button topbar__menu-toggle" id="sidebarToggle" type="button"
              aria-label="Abrir navegación lateral" aria-controls="appSidebar" aria-expanded="false">
              <i data-lucide="menu"></i>
            </button>
            <div class="topbar__copy">
              <span class="eyebrow" id="pageEyebrow">Inteligencia Artificial</span>
              <h1 id="pageTitle">DallA</h1>
              <p id="pageSubtitle">Tu asistente IA con conocimiento del restaurante.</p>
            </div>
          </div>
          <div class="topbar__actions">
            <button onclick="clearGroqKey(); location.reload();" title="Cambiar API Key"
              style="display:inline-flex; align-items:center; gap:6px; background:none; border:1px solid var(--color-border); border-radius:8px; padding:6px 12px; color:var(--color-text-muted); font-size:12px; cursor:pointer; transition:all .12s; font-family:var(--font-body);">
              🔑 API Key
            </button>
            <div class="avatar" style="overflow:hidden; padding:0; border:2px solid var(--color-accent);">
              <img src="./DalIA.webp" alt="DallA" style="width:100%; height:100%; object-fit:cover;" width="270" height="266" decoding="async" fetchpriority="high" onerror="this.onerror=null;this.src='./DalIA.png'" />
            </div>
          </div>
        </header>

        <!-- Main content -->
        <main class="module-page">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html" style="color: inherit; text-decoration: none;">Dashboard</a>
            <span>/</span>
            <strong>DallA</strong>
          </nav>

          <!-- Chat container -->
          <div class="ia-chat-wrapper">

            <!-- Header del chat -->
            <div class="ia-chat-header">
              <div class="ia-mascot-wrap">
                <img src="./DalIA.webp" alt="DallA" class="ia-mascot-img" width="270" height="266" decoding="async" fetchpriority="high" onerror="this.onerror=null;this.src='./DalIA.png'" />
                <span class="ia-mascot-status" title="En línea"></span>
              </div>
              <div class="ia-chat-header-info">
                <div class="ia-chat-header-name">
                  DallA
                  <span class="ia-badge-rag">RAG</span>
                </div>
                <div class="ia-chat-header-sub">
                  <span class="ia-header-dot"></span>
                  En línea · Asistente IA de MiRest
                </div>
              </div>
              <div class="ia-header-actions">
                <button class="ia-btn-icon" id="btn-new-chat" type="button" title="Nueva conversación">
                  <i data-lucide="plus" style="width:16px; height:16px;"></i>
                </button>
              </div>
            </div>

            <!-- Messages area -->
            <div id="chat-messages" role="log" aria-live="polite" aria-label="Historial de conversación"></div>

            <!-- Typing indicator -->
            <div id="typing-indicator" aria-label="DallA está escribiendo" aria-hidden="true">
              <div class="ti-avatar">
                <img src="./DalIA.webp" alt="DallA" width="270" height="266" decoding="async" onerror="this.onerror=null;this.src='./DalIA.png'" />
              </div>
              <div class="ti-dots">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
              </div>
            </div>

            <!-- Input area -->
            <div class="ia-input-area">
              <div class="ia-input-row">
                <textarea
                  id="chat-input"
                  maxlength="1000"
                  placeholder="Pregúntale algo a DallA..."
                  rows="1"
                  aria-label="Mensaje para DallA"
                ></textarea>
                <button id="btn-send" type="button" aria-label="Enviar mensaje">
                  <i data-lucide="send" style="width: 18px; height: 18px;"></i>
                </button>
              </div>
              <div class="ia-input-footer">
                <span class="ia-input-hint">
                  <kbd>Enter</kbd> enviar &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> nueva línea
                </span>
                <span id="char-counter" aria-live="polite">1000</span>
              </div>
            </div>
          </div>

          <footer class="page-footer">
            MiRest con IA · <span id="currentYear">2026</span> · DallA — Asistente IA.
          </footer>
        </main>
      </div>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-fab" type="button" aria-label="Cambiar tema">
      <i data-lucide="moon"></i>
    </button>

    <!-- Shell scripts -->
    <script type="module" src="../scripts/app.js"></script>
    <script type="module" src="./ia.js"></script>
    <script src="../scripts/dalia-widget.js"></script>
  </body>
</html>
