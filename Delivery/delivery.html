<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f07c2a" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q0F5JGJY4B"></script>
    <script src="../scripts/gtag-config.js"></script>
    <title>MiRest con IA | Delivery</title>
    <script>
      document.documentElement.classList.add("js");
      document.documentElement.dataset.theme = localStorage.getItem("mirest-ui-theme") || "light";
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&family=Inter:wght@300..900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="../Pwa/manifest.webmanifest" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/premium-modules.css" />
    <link rel="stylesheet" href="../styles/mobile.css?v=20260420-mobilev1" />
    <link rel="stylesheet" href="./delivery.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-root-path="../" data-page-type="module" data-module-key="delivery-afiliados">
    <div class="app-shell">
      <aside class="sidebar" id="appSidebar" aria-label="Panel lateral">
        <div class="sidebar__brand">
          <div class="brand-mark" aria-hidden="true">IA</div>
          <div class="brand-copy">
            <span class="brand-copy__eyebrow">MiRest</span>
            <strong>MiRest con IA</strong>
            <span>Dashboard administrativo base</span>
          </div>
        </div>

        <nav id="sidebarNav" class="sidebar__nav" aria-label="Navegación principal"></nav>
      </aside>

      <button
        class="sidebar-backdrop"
        id="sidebarBackdrop"
        type="button"
        aria-label="Cerrar navegación lateral"
      ></button>

      <div class="app-main">
        <header class="topbar">
          <div class="topbar__lead">
            <button
              class="icon-button topbar__menu-toggle"
              id="sidebarToggle"
              type="button"
              aria-label="Abrir navegación lateral"
              aria-controls="appSidebar"
              aria-expanded="false"
            >
              <i data-lucide="menu"></i>
            </button>

            <div class="topbar__copy">
              <span class="eyebrow" id="pageEyebrow">Módulo</span>
              <h1 id="pageTitle">Delivery</h1>
              <p id="pageSubtitle">Inicializando módulo...</p>
            </div>
          </div>

          <div class="topbar__actions">
            <span class="chip chip--soft" id="pageContextChip">DA</span>
            <div class="avatar" id="pageAvatar" aria-label="Iniciales del módulo">DA</div>
          </div>
        </header>

        <main class="dashboard">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a id="breadcrumbHome" href="../index.html">Dashboard</a>
            <span>/</span>
            <span id="moduleBreadcrumbCurrent">Delivery</span>
          </nav>

          <div class="delivery-hub-header">
            <div class="search-container">
              <i data-lucide="search"></i>
              <input type="text" id="orderSearch" class="search-input" placeholder="Buscar pedido por nombre o ID...">
            </div>
          </div>

          <div class="mod-stats-row" id="metricsContainer">
            <!-- Métricas renderizadas dinámicamente -->
          </div>

          <div class="kanban-board">
            <!-- Columna Pendientes -->
            <div class="kanban-col">
              <div class="kanban-col-header col-header--pendiente">
                <i data-lucide="package"></i>
                <h3>Entrantes / Pendientes</h3>
                <span class="col-count" id="countPendiente">0</span>
              </div>
              <div id="colPendiente" class="kanban-list"></div>
            </div>

            <!-- Columna En Preparación -->
            <div class="kanban-col">
              <div class="kanban-col-header col-header--preparacion">
                <i data-lucide="chef-hat"></i>
                <h3>En Preparación</h3>
                <span class="col-count" id="countPreparacion">0</span>
              </div>
              <div id="colPreparacion" class="kanban-list"></div>
            </div>

            <!-- Columna Listo para Recoger -->
            <div class="kanban-col">
              <div class="kanban-col-header col-header--listo">
                <i data-lucide="check-circle"></i>
                <h3>Listo para Recoger</h3>
                <span class="col-count" id="countListo">0</span>
              </div>
              <div id="colListo" class="kanban-list"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <button id="themeToggle" class="theme-fab" type="button" aria-label="Cambiar tema">
      <i data-lucide="moon"></i>
    </button>

    <script type="module" src="../scripts/app.js"></script>
    <script type="module" src="./delivery.js"></script>
    <script src="../scripts/dalia-widget.js"></script>
  </body>
</html>
