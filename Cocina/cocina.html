<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f07c2a" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q0F5JGJY4B"></script>
    <script src="../scripts/gtag-config.js"></script>
    <title>MiRest con IA | Cocina</title>
    <script>
      document.documentElement.classList.add("js");
      document.documentElement.dataset.theme = localStorage.getItem("mirest-ui-theme") || "light";
    </script>
    <link rel="icon" type="image/png" href="../Caja/icon/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..800&family=Inter:wght@300..900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="../Pwa/manifest.webmanifest" />
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/premium-modules.css" />
    <link rel="stylesheet" href="../styles/module-placeholder.css" />
    <link rel="stylesheet" href="../styles/mobile.css?v=20260420-mobilev1" />
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* ─── Tokens Cocina ─── */
      :root {
        --ck-orange:     var(--color-accent);
        --ck-orange2:    var(--color-accent-dark);
        --ck-orange-dim: var(--color-accent-soft);
        --ck-green:      var(--color-success);
        --ck-green-dim:  var(--color-success-soft);
        --ck-red:        var(--color-red, #ef4444);
        --ck-red-dim:    rgba(239,68,68,0.15);
        --ck-yellow:     var(--color-warning);
        --ck-yellow-dim: var(--color-warning-soft);
        --ck-radius:     12px;
      }

      /* ─── Theme Colors ─── */
      [data-theme="dark"] {
        --color-surface: #1e293b;
        --color-surface-muted: #0f172a;
        --color-border: #334155;
        --color-text: #f8fafc;
        --color-text-muted: #94a3b8;
        --ck-orange-dim: rgba(240,124,42,0.25);
      }

      /* ─── Stats ─── */
      .ck-stats-row {
        display: flex;
        gap: 14px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .ck-stat-card {
        flex: 1;
        min-width: 140px;
        background: linear-gradient(180deg, var(--color-surface) 0%, #fcfdfe 100%);
        border: 1px solid var(--color-border);
        border-radius: var(--ck-radius);
        padding: 18px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: var(--shadow-card);
        transition: transform .15s, box-shadow .15s, border-color .15s;
      }
      .ck-stat-card:hover {
        transform: translateY(-4px);
        border-color: var(--color-border-strong);
        box-shadow: var(--shadow-card-hover);
      }

      body[data-theme="dark"] .ck-stat-card {
        background: linear-gradient(180deg, var(--color-surface), var(--color-surface-muted));
      }
      .ck-stat-icon {
        width: 44px;
        height: 44px;
        border-radius: 11px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .ck-stat-icon svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }
      .ck-stat-icon--orange { background: var(--ck-orange-dim); color: var(--ck-orange); }
      .ck-stat-icon--green  { background: var(--ck-green-dim);  color: var(--ck-green); }
      .ck-stat-icon--red    { background: var(--ck-red-dim);    color: var(--ck-red); }
      .ck-stat-label {
        font-size: 12px;
        color: var(--color-text-muted);
        margin-bottom: 2px;
      }
      .ck-stat-value {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        color: var(--color-text);
        line-height: 1;
      }

      /* ─── Search ─── */
      .ck-search-wrap {
        position: relative;
        margin-bottom: 16px;
      }
      .ck-search-wrap lord-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }
      .ck-search-input {
        width: 100%;
        padding: 12px 14px 12px 48px;
        box-sizing: border-box;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--ck-radius);
        color: var(--color-text);
        font-size: 14px;
        font-family: var(--font-body);
        transition: border-color .15s, box-shadow .15s;
        box-shadow: var(--shadow-sm);
      }
      .ck-search-input:focus {
        outline: none;
        border-color: var(--ck-orange);
        box-shadow: 0 0 0 3px var(--ck-orange-dim);
      }
      .ck-search-input::placeholder { color: var(--color-text-muted); }

      /* ─── Filter bar ─── */
      .ck-filter-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .ck-filter-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        color: var(--color-text-muted);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all .2s;
        font-family: var(--font-body);
        box-shadow: var(--shadow-sm);
      }
      .ck-filter-btn:hover {
        border-color: var(--ck-orange);
        color: var(--color-text);
        transform: translateY(-2px);
      }
      .ck-filter-btn.active {
        background: linear-gradient(135deg, var(--ck-orange), var(--ck-orange2));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(240,124,42,.35);
      }
      .ck-filter-count {
        border-radius: 10px;
        padding: 1px 8px;
        font-size: 11px;
        font-weight: 700;
      }
      .ck-filter-btn.active .ck-filter-count {
        background: rgba(255,255,255,.25);
        color: #fff;
      }
      .ck-filter-btn:not(.active) .ck-filter-count {
        background: var(--color-surface-muted);
        color: var(--color-text);
      }

      /* ─── Dish grid ─── */
      .ck-dish-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      /* ─── Dish card ─── */
      .ck-dish-card {
        background: linear-gradient(180deg, var(--color-surface) 0%, #fcfdfe 100%);
        border: 1px solid var(--color-border);
        border-radius: var(--ck-radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition: transform .25s var(--transition-base), box-shadow .25s var(--transition-base), border-color .2s;
        animation: ck-card-in .35s ease-out;
        display: flex;
        flex-direction: column;
      }
      .ck-dish-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-card-hover);
        border-color: var(--color-border-strong);
      }

      body[data-theme="dark"] .ck-dish-card {
        background: linear-gradient(180deg, var(--color-surface), var(--color-surface-muted));
      }
      .ck-dish-card--urgent {
        border-color: var(--ck-red);
        box-shadow: 0 0 0 1px var(--ck-red), var(--shadow-card);
      }
      @keyframes ck-card-in {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─── Card header: Mesa + Nombre + Cantidad ─── */
      .ck-dish-header {
        padding: 20px 20px 16px;
        background: linear-gradient(to bottom, var(--color-surface-muted), transparent);
      }

      /* Pill "Mesa 3" */
      .ck-mesa-tag {
        display: inline-flex;
        align-items: center;
        background: var(--ck-orange);
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .1em;
        padding: 4px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        box-shadow: 0 2px 6px var(--ck-orange-dim);
      }

      /* Nombre del plato — protagonista GIGANTE */
      .ck-dish-name {
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 800;
        color: var(--color-text);
        line-height: 1.1;
        margin-bottom: 10px;
        letter-spacing: -0.02em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
      }

      /* Fila cantidad + notas */
      .ck-dish-qty {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Badge "×2" */
      .ck-qty-badge {
        background: var(--color-text);
        color: var(--color-surface);
        border-radius: 8px;
        padding: 4px 12px;
        font-size: 18px;
        font-weight: 900;
        font-family: var(--font-display);
        box-shadow: var(--shadow-sm);
      }

      /* Texto de notas */
      .ck-dish-notes {
        font-size: 13px;
        font-weight: 500;
        color: var(--ck-orange);
        background: var(--ck-orange-dim);
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
      }

      /* Image area compacta y profesional */
      .ck-dish-img-area {
        width: 100%;
        height: 140px;
        background: var(--color-surface-muted);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        box-sizing: border-box;
      }
      .ck-dish-img-wrapper {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--color-border);
      }
      .ck-dish-img-area img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform .4s ease;
      }
      .ck-dish-card:hover .ck-dish-img-area img { transform: scale(1.1); }
      .ck-img-placeholder {
        color: var(--color-text-muted);
        opacity: .3;
      }
      .ck-img-actions {
        position: absolute;
        inset: 12px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        background: rgba(0,0,0,0.5);
        opacity: 0;
        transition: opacity .25s;
        backdrop-filter: blur(3px);
        border-radius: 12px;
      }
      .ck-dish-card:hover .ck-img-actions { opacity: 1; }
      .ck-img-action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        background: white;
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-family: var(--font-body);
        font-weight: 700;
        color: #15192c;
        width: 50px; height: 50px;
        border-radius: 12px;
        justify-content: center;
        transition: transform .2s, background .2s;
      }
      .ck-img-action-btn:hover { transform: scale(1.1); background: #f07c2a; color: white; }
      .ck-img-action-btn--danger:hover { background: #ef4444 !important; }

      /* Timer + progress */
      .ck-dish-info { padding: 12px 14px 6px; flex: 1; }

      .ck-dish-timer-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 8px;
      }
      .ck-dish-timer {
        font-family: var(--font-display);
        font-size: 34px;
        font-weight: 700;
        color: var(--color-text);
        line-height: 1;
      }
      .ck-dish-timer--warn   { color: var(--ck-yellow); }
      .ck-dish-timer--danger { color: var(--ck-red); }
      .ck-dish-estimated {
        font-size: 13px;
        color: var(--color-text-muted);
      }

      /* Progress bar */
      .ck-progress-bar {
        width: 100%;
        height: 4px;
        background: var(--color-border);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 2px;
      }
      .ck-progress-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 1s linear;
      }
      .ck-progress-fill--ok     { background: var(--ck-orange); }
      .ck-progress-fill--warn   { background: var(--ck-yellow); }
      .ck-progress-fill--danger { background: var(--ck-red); }

      /* Action buttons */
      .ck-dish-actions {
        display: flex;
        gap: 8px;
        padding: 10px 14px 14px;
      }
      .ck-action-btn {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all .15s;
        font-family: var(--font-body);
      }
      .ck-action-btn svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }
      .ck-action-btn--done {
        background: linear-gradient(135deg, var(--ck-orange), var(--ck-orange2));
        color: #fff;
        box-shadow: 0 2px 8px rgba(240,124,42,.3);
      }
      .ck-action-btn--done:hover {
        box-shadow: 0 4px 16px rgba(240,124,42,.45);
        transform: translateY(-1px);
      }
      .ck-action-btn--reject {
        background: var(--color-surface-muted);
        color: var(--color-text);
        border-color: var(--color-border);
      }
      .ck-action-btn--reject:hover {
        border-color: var(--ck-red);
        color: var(--ck-red);
        background: var(--ck-red-dim);
      }
      .ck-action-btn--deliver {
        background: var(--ck-green);
        color: #fff;
        box-shadow: 0 2px 8px rgba(34,197,94,.25);
      }
      .ck-action-btn--deliver:hover {
        background: #1aaa4e;
        box-shadow: 0 4px 16px rgba(34,197,94,.4);
        transform: translateY(-1px);
      }

      /* Empty state */
      .ck-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-text-muted);
        grid-column: 1 / -1;
      }
      .ck-empty svg {
        width: 48px;
        height: 48px;
        stroke: var(--color-text-muted);
        opacity: .3;
        margin-bottom: 12px;
        fill: none;
        stroke-width: 2;
        display: block;
        margin-inline: auto;
      }
      .ck-empty p { font-size: 15px; color: var(--color-text-muted); }

      /* Modal */
      .ck-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        backdrop-filter: blur(5px);
        display: none;
        place-items: center;
        z-index: 200;
      }
      .ck-modal-overlay.open { display: grid; }
      .ck-modal {
        background: linear-gradient(180deg, var(--color-surface) 0%, #fcfdfe 100%);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        padding: 28px;
        width: 90%;
        max-width: 420px;
        animation: ck-modal-in .22s ease-out;
        box-shadow: var(--shadow-elevated);
      }

      body[data-theme="dark"] .ck-modal {
        background: linear-gradient(180deg, var(--color-surface), var(--color-surface-muted));
      }
      @keyframes ck-modal-in {
        from { opacity: 0; transform: scale(.95); }
        to   { opacity: 1; transform: scale(1); }
      }
      .ck-modal__head {
        font-family: var(--font-display);
        font-size: 19px;
        font-weight: 700;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--color-text);
      }
      .ck-modal__close {
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        padding: 4px;
      }
      .ck-modal__close svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        display: block;
      }
      .ck-form-group { margin-bottom: 15px; }
      .ck-form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 5px;
        color: var(--color-text-muted);
      }
      .ck-form-group input,
      .ck-form-group select,
      .ck-form-group textarea {
        width: 100%;
        padding: 10px 14px;
        border-radius: 8px;
        box-sizing: border-box;
        border: 1px solid var(--color-border);
        background: var(--color-bg);
        color: var(--color-text);
        font-size: 14px;
        font-family: var(--font-body);
        transition: border-color .15s;
      }
      .ck-form-group input:focus,
      .ck-form-group select:focus,
      .ck-form-group textarea:focus {
        outline: none;
        border-color: var(--ck-orange);
        box-shadow: 0 0 0 3px var(--ck-orange-dim);
      }
      .ck-form-group textarea { resize: vertical; min-height: 80px; }

      /* Topbar buttons */
      .ck-topbar-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--ck-orange), var(--ck-orange2));
        color: #fff;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: box-shadow .15s, transform .12s, filter .12s;
        font-family: var(--font-body);
        box-shadow: 0 2px 10px rgba(240,124,42,.35);
      }
      #btnAddDish {
        animation: ck-pulse-orange 2s infinite;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      @keyframes ck-pulse-orange {
        0% { box-shadow: 0 0 0 0 rgba(240, 124, 42, 0.7); transform: scale(1); }
        70% { box-shadow: 0 0 0 10px rgba(240, 124, 42, 0); transform: scale(1.05); }
        100% { box-shadow: 0 0 0 0 rgba(240, 124, 42, 0); transform: scale(1); }
      }
      .ck-topbar-btn:hover {
        box-shadow: 0 5px 20px rgba(240,124,42,.5);
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .ck-topbar-btn svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }
      .ck-topbar-btn--ghost {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        color: var(--color-text);
        box-shadow: var(--shadow-sm);
      }
      .ck-topbar-btn--ghost:hover {
        background: var(--color-surface-muted);
        box-shadow: var(--shadow-card);
        transform: translateY(-2px);
      }

      /* ── Toast ── */
      .ck-toast {
        position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: var(--color-surface); border: 1px solid var(--color-border);
        padding: 12px 20px; border-radius: 12px; display: flex; align-items: center; gap: 12px;
        box-shadow: var(--shadow-card); z-index: 1000; transition: transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        color: var(--color-text); font-size: 14px; pointer-events: none; opacity: 0;
      }
      .ck-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      @media (max-width: 768px) {
        .ck-dish-grid  { grid-template-columns: 1fr; }
        .ck-stats-row  { flex-direction: column; }
      }
    </style>
  </head>

  <body data-root-path="../" data-page-type="module" data-module-key="cocina">
    <div class="app-shell">

      <!-- Sidebar -->
      <aside class="sidebar" id="appSidebar" aria-label="Panel lateral">
        <div class="sidebar__brand">
          <div class="brand-mark" aria-hidden="true">IA</div>
          <div class="brand-copy">
            <span class="brand-copy__eyebrow">MiRest</span>
            <strong>MiRest con IA</strong>
            <span>Dashboard administrativo</span>
          </div>
        </div>
        <nav id="sidebarNav" class="sidebar__nav" aria-label="Navegación principal"></nav>
      </aside>

      <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="Cerrar navegación lateral"></button>

      <!-- App main -->
      <div class="app-main">

        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar__lead">
            <button class="icon-button topbar__menu-toggle" id="sidebarToggle" type="button"
              aria-label="Abrir navegación lateral" aria-controls="appSidebar" aria-expanded="false">
              <i data-lucide="menu"></i>
            </button>
            <div class="topbar__copy">
              <span class="eyebrow" id="pageEyebrow">Operaciones</span>
              <h1 id="pageTitle">Cocina</h1>
              <p id="pageSubtitle">Gestiona el estado de preparación de forma rápida y clara</p>
            </div>
          </div>
          <div class="topbar__actions">
            <button class="ck-topbar-btn ck-topbar-btn--ghost" id="btnActivateIA">
              <i data-lucide="zap" style="width:16px;height:16px;color:var(--ck-orange)"></i>
              Activar IA
            </button>
            <button class="ck-topbar-btn ck-topbar-btn--ghost" id="btnAddDish">
              <i data-lucide="plus" style="width:16px;height:16px"></i>
              Nuevo Pedido
            </button>
          </div>
        </header>

        <!-- Main content -->
        <main class="module-page">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html" style="color: inherit; text-decoration: none;">Dashboard</a>
            <span>/</span>
            <strong>Cocina</strong>
          </nav>

          <!-- Stats -->
          <div class="ck-stats-row" id="ckStatsContainer">
            <div class="ck-stat-card">
              <div class="ck-stat-icon" style="background: var(--ck-orange-dim); color: var(--ck-orange); border-radius: 8px; width: 44px; height: 44px; display: grid; place-items: center;">
                <i data-lucide="flame" style="width: 24px; height: 24px;"></i>
              </div>
              <div>
                <div class="ck-stat-label">En preparación</div>
                <div class="ck-stat-value" id="countPrep">0</div>
              </div>
            </div>
            <div class="ck-stat-card">
              <div class="ck-stat-icon" style="background: var(--color-surface-muted); color: var(--color-text-muted); border-radius: 8px; width: 44px; height: 44px; display: grid; place-items: center;">
                <i data-lucide="shopping-bag" style="width: 24px; height: 24px;"></i>
              </div>
              <div>
                <div class="ck-stat-label">Pendientes</div>
                <div class="ck-stat-value" id="countPending">0</div>
              </div>
            </div>
            <div class="ck-stat-card">
              <div class="ck-stat-icon ck-stat-icon--red">
                <i data-lucide="alert-circle" style="width:24px;height:24px;color:var(--ck-red)"></i>
              </div>
              <div>
                <div class="ck-stat-label">Urgentes</div>
                <div class="ck-stat-value" id="statUrgent">0</div>
              </div>
            </div>
            <div class="ck-stat-card">
              <div class="ck-stat-icon ck-stat-icon--green">
                <i data-lucide="check-circle" style="width:24px;height:24px;color:var(--ck-green)"></i>
              </div>
              <div>
                <div class="ck-stat-label">Entregados hoy</div>
                <div class="ck-stat-value" id="statDelivered">0</div>
              </div>
            </div>
          </div>

          <!-- Search -->
          <div class="ck-search-wrap" id="ckSearchContainer">
            <i data-lucide="search" style="width:20px;height:20px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-text-muted);pointer-events:none"></i>
            <input type="text" class="ck-search-input" id="searchInput" placeholder="Buscar por mesa, producto o nota...">
          </div>

          <!-- Filter bar -->
          <div class="ck-filter-bar" id="ckFilterContainer">
            <button class="ck-filter-btn active" data-filter="preparing">
              <i data-lucide="flame" style="width:16px;height:16px"></i> Preparando <span class="ck-filter-count" id="countPreparing">0</span>
            </button>
            <button class="ck-filter-btn" data-filter="done">
              <i data-lucide="check-circle-2" style="width:16px;height:16px"></i> Listos <span class="ck-filter-count" id="countDone">0</span>
            </button>
            <button class="ck-filter-btn" data-filter="delivered">
              <i data-lucide="package-check" style="width:16px;height:16px"></i> Entregados <span class="ck-filter-count" id="countDelivered">0</span>
            </button>
            <button class="ck-filter-btn" data-filter="rejected">
              <i data-lucide="ban" style="width:16px;height:16px"></i> Rechazados <span class="ck-filter-count" id="countRejected">0</span>
            </button>
          </div>

          <!-- Dish grid -->
          <div class="ck-dish-grid" id="dishGrid"></div>

          <footer class="page-footer">
            MiRest con IA · <span id="currentYear">2026</span> · Módulo Cocina
          </footer>
        </main>
      </div>
    </div>

    <!-- Modal: Nuevo Pedido -->
    <div class="ck-modal-overlay" id="addDishModal">
      <div class="ck-modal">
        <div class="ck-modal__head">
          Nuevo Pedido
          <button class="ck-modal__close" id="closeModal">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="ck-form-group">
          <label>Nombre del plato</label>
          <input type="text" id="dishName" placeholder="Ej: Lomo Saltado">
        </div>
        <div class="ck-form-group">
          <label>Mesa</label>
          <input type="number" id="dishTable" placeholder="Número de mesa" min="1">
        </div>
        <div class="ck-form-group">
          <label>Cantidad</label>
          <input type="number" id="dishQty" value="1" min="1" max="20">
        </div>
        <div class="ck-form-group">
          <label>Notas (opcional)</label>
          <textarea id="dishNotes" placeholder="Sin picante, bien cocido..."></textarea>
        </div>
        <button class="ck-topbar-btn" id="submitDish" style="width:100%;justify-content:center;font-size:15px;padding:12px;border-radius:10px;">
          Agregar Pedido
        </button>
      </div>
    </div>

    <!-- Toast -->
    <div class="ck-toast" id="ckToast">
      <i data-lucide="bell" id="ckToastIcon" style="width:24px;height:24px;color:var(--ck-orange)"></i>
      <span id="ckToastMsg"></span>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-fab" type="button" aria-label="Cambiar tema">
      <i data-lucide="moon"></i>
    </button>

    <!-- Shell scripts -->
    <script type="module" src="../scripts/app.js"></script>
    <script type="module" src="./cocina.js"></script>
    <script src="../scripts/dalia-widget.js"></script>
    <script type="module" src="./cocina-onboarding.js"></script>
  </body>
</html>
