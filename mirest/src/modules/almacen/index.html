<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiRest · Almacen</title>
    <link rel="stylesheet" href="../../shared/ui/base.css" />
    <link rel="stylesheet" href="../../shared/ui/components.css" />
    <link rel="stylesheet" href="../../shared/ui/layout.css" />
    <link rel="stylesheet" href="./almacen.module.css" />
  </head>
  <body>
    <main class="container">
      <header class="head">
        <h1>Almacen</h1>
        <a class="btn" href="../../apps/web/index.html">Volver al panel</a>
      </header>

      <section class="card">
        <h2>Nuevo insumo</h2>
        <form id="almacenForm" class="form-grid">
          <input class="input" id="nombre" placeholder="Nombre de insumo" required />
          <input class="input" id="stock" type="number" step="0.01" min="0" placeholder="Stock" required />
          <input class="input" id="unidad" placeholder="Unidad (kg, lt, u...)" />
          <input class="input" id="minimo" type="number" step="0.01" min="0" placeholder="Mínimo" />
          <button class="btn btn--primary" type="submit">Guardar</button>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Listado</h2>
        <div id="lista" class="list"></div>
      </section>
    </main>
    <script type="module" src="./almacen.module.js"></script>
  </body>
</html>
