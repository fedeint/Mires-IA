<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiRest · Soporte</title>
    <link rel="stylesheet" href="../../shared/ui/base.css" />
    <link rel="stylesheet" href="../../shared/ui/components.css" />
    <link rel="stylesheet" href="../../shared/ui/layout.css" />
    <link rel="stylesheet" href="./soporte.module.css" />
  </head>
  <body>
    <main class="container">
      <header class="head">
        <h1>Soporte</h1>
        <a class="btn" href="../../apps/web/index.html">Volver al panel</a>
      </header>
      <section class="card">
        <h2>Nuevo ticket</h2>
        <form id="form" class="form-grid">
          <input class="input" id="ticket" placeholder="Ticket" required />
          <input class="input" id="asunto" placeholder="Asunto" required />
          <input class="input" id="estado" placeholder="Estado" required />
          <button class="btn btn--primary" type="submit">Guardar</button>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
      <section class="card">
        <h2>Listado</h2>
        <div id="lista" class="list"></div>
      </section>
    </main>
    <script type="module" src="./soporte.module.js"></script>
  </body>
</html>
